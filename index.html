<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌍 国旗＆州当てクイズ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
:root {
  --bg: #0d0f1a;
  --card: #161929;
  --card2: #1e2235;
  --accent: #4f9eff;
  --accent2: #ff5f7e;
  --accent3: #3ddba6;
  --accent4: #f9c846;
  --text: #eef0ff;
  --sub: #7880a8;
  --border: #252840;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
.screen { display: none; min-height: 100vh; flex-direction: column; }
.screen.active { display: flex; }

/* TOP */
#screen-top {
  align-items: center; padding: 36px 20px 28px; gap: 20px;
  background: radial-gradient(ellipse at 25% 15%, #10184a 0%, #0d0f1a 60%);
  overflow-y: auto;
}
.logo { font-size: 52px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.title { font-size: 28px; font-weight: 900; background: linear-gradient(135deg,#4f9eff,#ff5f7e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
.subtitle { font-size: 12px; color: var(--sub); text-align:center; }
.region-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 380px; }
.region-btn {
  background: var(--card); border: 2px solid var(--border); border-radius: 14px;
  padding: 14px 10px; cursor: pointer; text-align: center; transition: all .15s; color: var(--text);
}
.region-btn:active { transform: scale(.96); }
.region-btn.selected { border-color: var(--accent); background: #0e1e38; box-shadow: 0 0 18px #4f9eff33; }
.r-emoji { font-size: 26px; display: block; margin-bottom: 3px; }
.r-name { font-size: 12px; font-weight: 900; display: block; }
.r-count { font-size: 10px; color: var(--sub); }
.repair-btn-wrap { width: 100%; max-width: 380px; }
.repair-banner {
  background: linear-gradient(135deg, #3a1520, #1a0a0a); border: 2px solid var(--accent2);
  border-radius: 14px; padding: 14px 18px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; transition: all .15s; width: 100%; font-family: inherit;
}
.repair-banner:active { transform: scale(.97); }
.rb-icon { font-size: 28px; }
.rb-title { font-size: 14px; font-weight: 900; color: var(--accent2); }
.rb-sub { font-size: 11px; color: var(--sub); margin-top: 2px; }
.repair-badge { background: var(--accent2); color: #fff; border-radius: 99px; padding: 2px 8px; font-size: 11px; font-weight: 900; margin-left: auto; flex-shrink: 0; }
.start-btn {
  background: linear-gradient(135deg, #4f9eff, #7b5fff); color: #fff; border: none;
  border-radius: 50px; padding: 15px 32px; font-size: 16px; font-weight: 900;
  font-family: inherit; cursor: pointer; transition: all .15s;
  box-shadow: 0 4px 20px #4f9eff44; width: 100%; max-width: 380px;
}
.start-btn:active { transform: scale(.97); }
.start-btn:disabled { opacity: .35; cursor: not-allowed; }

/* LIST */
#screen-list { background: var(--bg); }
.list-header { background: var(--card); padding: 18px 20px 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
.list-header h2 { font-size: 19px; font-weight: 900; }
.list-header p { font-size: 11px; color: var(--sub); margin-top: 3px; }
.country-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 14px; flex: 1; }
.country-card { background: var(--card); border-radius: 12px; padding: 10px 12px; display: flex; align-items: center; gap: 8px; border: 1px solid var(--border); font-size: 13px; font-weight: 700; }
.flag-em { font-size: 24px; flex-shrink: 0; }
.list-footer { padding: 14px 20px; background: var(--bg); position: sticky; bottom: 0; border-top: 1px solid var(--border); }

/* QUIZ */
#screen-quiz { justify-content: space-between; overflow: hidden; position: relative; }
.quiz-header {
  background: var(--card); padding: 12px 18px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.progress-bar { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg,#4f9eff,#ff5f7e); border-radius: 99px; transition: width .2s; }
.score-badge { font-size: 13px; font-weight: 900; color: var(--accent3); white-space: nowrap; }

.quiz-body {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 12px 14px 10px; gap: 10px; overflow-y: auto;
}
.question-num { font-size: 11px; color: var(--sub); font-weight: 900; flex-shrink: 0; }
.hint-text { font-size: 14px; color: var(--text); font-weight: 900; flex-shrink: 0; text-align: center; }

.map-wrap {
  width: 100%; max-width: 420px;
  flex-shrink: 0; position: relative;
}

.giant-flag-wrap {
  background: var(--card2);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 40px 0;
  text-align: center;
  font-size: 120px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  animation: float-flag 3s ease-in-out infinite;
}

.map-image-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  background: #000;
}
.map-image-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

.glow-dot {
  position: absolute;
  width: 12px;
  height: 12px;
  background-color: var(--accent3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 15px 5px rgba(61, 219, 166, 0.6);
  animation: pulse-dot 0.8s infinite;
  transition: all 0.2s;
}
@keyframes pulse-dot {
  0% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px 2px rgba(61, 219, 166, 0.4); }
  50% { transform: translate(-50%, -50%) scale(1.3); box-shadow: 0 0 20px 8px rgba(61, 219, 166, 0.9); }
  100% { transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 10px 2px rgba(61, 219, 166, 0.4); }
}

.choices { width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; margin-top: 10px; }
.choice-btn {
  background: var(--card2); border: 2px solid var(--border); border-radius: 13px;
  padding: 14px 16px; font-size: 15px; font-weight: 700; font-family: inherit; color: var(--text);
  cursor: pointer; text-align: left; transition: all .1s; display: flex; align-items: center; gap: 10px;
}
.choice-btn:active { transform: scale(.98); }
.choice-btn.correct { background: #0f2e20; border-color: var(--accent3); color: var(--accent3); animation: correct-flash .2s; }
.choice-btn.wrong { background: #2e0f18; border-color: var(--accent2); color: var(--accent2); animation: shake .2s; }
.choice-btn.reveal { border-color: var(--accent3); opacity: .55; }
.choice-btn:disabled { cursor: not-allowed; }
@keyframes correct-flash { 0%{transform:scale(1)} 30%{transform:scale(1.04)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.choice-letter { width: 26px; height: 26px; border-radius: 7px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 900; flex-shrink: 0; }

.result-popup { position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%) scale(0); font-size: 60px; z-index: 100; transition: transform .15s cubic-bezier(.34,1.56,.64,1); pointer-events: none; }
.result-popup.show { transform: translate(-50%,-50%) scale(1); }
.result-popup.hide { transform: translate(-50%,-50%) scale(0); transition: transform .15s; }

/* 右下フローティングボタン群 (ホームに戻るのみ) */
.fab-container {
  position: absolute;
  bottom: 20px;
  right: 20px;
  display: flex;
  flex-direction: column;
  z-index: 90;
}
.fab-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--text);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
  transition: all 0.2s;
}
.fab-btn:active { transform: scale(0.85); background: var(--card2); }

/* RESULT */
#screen-result { align-items: center; justify-content: center; padding: 28px 20px; gap: 18px; background: radial-gradient(ellipse at 70% 80%, #14082a 0%, #0d0f1a 60%); overflow-y: auto; }
.result-emoji { font-size: 64px; animation: float 3s ease-in-out infinite; }
.result-title { font-size: 24px; font-weight: 900; text-align: center; }
.result-score { font-size: 52px; font-weight: 900; background: linear-gradient(135deg,#4f9eff,#ff5f7e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.result-detail { font-size: 13px; color: var(--sub); }
.wrong-list { background: var(--card); border-radius: 16px; padding: 14px; width: 100%; max-width: 360px; max-height: 200px; overflow-y: auto; }
.wrong-list h3 { font-size: 12px; color: var(--sub); font-weight: 900; margin-bottom: 10px; }
.wrong-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.wrong-item:last-child { border-bottom: none; }
.wrong-count { font-size: 10px; color: var(--accent2); font-weight: 900; margin-left: auto; white-space: nowrap; }
.btn-row { display: flex; flex-direction: column; gap: 9px; width: 100%; max-width: 360px; }
.outline-btn { background: transparent; color: var(--text); border: 2px solid var(--border); border-radius: 50px; padding: 13px 24px; font-size: 14px; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
.outline-btn:active { transform: scale(.97); }
</style>
</head>
<body>

<div id="screen-top" class="screen active">
  <div class="logo">🌍</div>
  <div><div class="title">国旗＆州クイズ</div><div class="subtitle">国旗や地図から正解を当てよう！</div></div>
  <div class="region-grid" id="region-grid"></div>
  <div class="repair-btn-wrap" id="repair-btn-wrap" style="display:none">
    <button class="repair-banner" id="btn-repair-mode">
      <span class="rb-icon">🔥</span>
      <div class="rb-text"><div class="rb-title">補修コーナー</div><div class="rb-sub">3回以上間違えた場所を特訓！</div></div>
      <span class="repair-badge" id="repair-count-badge">0</span>
    </button>
  </div>
  <button class="start-btn" id="btn-to-list" disabled>📋 一覧を確認してスタート</button>
</div>

<div id="screen-list" class="screen">
  <div class="list-header"><h2 id="list-title"></h2><p id="list-sub"></p></div>
  <div class="country-list" id="country-list"></div>
  <div class="list-footer"><button class="start-btn" id="btn-start-quiz">🚀 クイズスタート！</button></div>
</div>

<div id="screen-quiz" class="screen">
  <div class="quiz-header">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="score-badge" id="score-badge">0点</div>
  </div>
  <div class="quiz-body" id="quiz-body">
    <div class="question-num" id="question-num"></div>
    <div class="hint-text" id="hint-text">✨ この国（州）はどこ？</div>
    <div class="map-wrap" id="map-wrap"></div>
    <div class="choices" id="choices"></div>
  </div>
  
  <div class="fab-container">
    <button class="fab-btn" onclick="quitQuiz()" title="途中でやめる">🏠</button>
  </div>
</div>
<div class="result-popup" id="result-popup"></div>

<div id="screen-result" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title"></div>
  <div class="result-score" id="result-score"></div>
  <div class="result-detail" id="result-detail"></div>
  <div class="wrong-list" id="wrong-list" style="display:none">
    <h3>❌ 間違えた場所 <span id="repair-hint" style="color:var(--accent2)"></span></h3>
    <div id="wrong-items"></div>
  </div>
  <div class="btn-row">
    <button class="start-btn" id="btn-retry">🔁 もう一度</button>
    <button class="outline-btn" id="btn-top">🏠 エリア選択に戻る</button>
  </div>
</div>

// ─────────────────────────────────────────────
let selectedRegion = null;
let quizCountries = [];
let currentQ = 0, score = 0;
let wrongAnswers = [];
let answered = false, isRepairMode = false;

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  buildRegionGrid();
  updateRepairBanner();
  document.getElementById('btn-to-list').onclick = goToList;
  document.getElementById('btn-start-quiz').onclick = startQuiz;
  document.getElementById('btn-retry').onclick = startQuiz;
  document.getElementById('btn-top').onclick = () => { isRepairMode = false; showScreen('screen-top'); updateRepairBanner(); };
  document.getElementById('btn-repair-mode').onclick = startRepairMode;
}

function buildRegionGrid() {
  const grid = document.getElementById('region-grid');
  Object.entries(REGIONS).forEach(([key, r]) => {
    const btn = document.createElement('button');
    btn.className = 'region-btn';
    btn.innerHTML = `<span class="r-emoji">${r.emoji}</span><span class="r-name">${r.name}</span><span class="r-count">${r.countries.length}ヶ国</span>`;
    btn.onclick = () => { selectedRegion = key; document.querySelectorAll('.region-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); document.getElementById('btn-to-list').disabled = false; };
    grid.appendChild(btn);
  });
}

function updateRepairBanner() {
  const rc = getRepairCountries();
  const wrap = document.getElementById('repair-btn-wrap');
  document.getElementById('repair-count-badge').textContent = rc.length;
  wrap.style.display = rc.length > 0 ? 'block' : 'none';
}

function getRepairCountries() {
  return Object.entries(wrongCounts).filter(([k,v]) => v >= 3).map(([k]) => {
    const [rk, name] = k.split(':');
    const reg = REGIONS[rk]; if (!reg) return null;
    const c = reg.countries.find(c => c.name === name); if (!c) return null;
    return {...c, regionKey: rk};
  }).filter(Boolean);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ─────────────────────────────────────────────
// LIST & NAVIGATION
// ─────────────────────────────────────────────
function goToList() {
  const r = REGIONS[selectedRegion];
  document.getElementById('list-title').textContent = `${r.emoji} ${r.name}`;
  document.getElementById('list-sub').textContent = r.mapType === 'us' ? `全${r.countries.length}州 — 地図で場所を光らせて出題！` : `全${r.countries.length}ヶ国 — 国旗を見て名前を当てよう！`;
  const list = document.getElementById('country-list');
  list.innerHTML = '';
  r.countries.forEach(c => {
    const card = document.createElement('div');
    card.className = 'country-card';
    card.innerHTML = `<span class="flag-em">${c.flag || '📍'}</span><span>${c.name}</span>`;
    list.appendChild(card);
  });
  showScreen('screen-list');
}

// 途中でやめる処理
function quitQuiz() {
  if(confirm("クイズを途中でやめてホームに戻りますか？")) {
    isRepairMode = false;
    showScreen('screen-top');
    updateRepairBanner();
  }
}

// ─────────────────────────────────────────────
// QUIZ
// ─────────────────────────────────────────────
function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function startQuiz() {
  isRepairMode = false;
  quizCountries = shuffle(REGIONS[selectedRegion].countries);
  currentQ = 0; score = 0; wrongAnswers = [];
  showScreen('screen-quiz');
  showQuestion();
}

function startRepairMode() {
  isRepairMode = true;
  quizCountries = shuffle(getRepairCountries());
  currentQ = 0; score = 0; wrongAnswers = [];
  showScreen('screen-quiz');
  showQuestion();
}

function getRegion(c) {
  return isRepairMode ? REGIONS[c.regionKey] : REGIONS[selectedRegion];
}

function showQuestion() {
  answered = false;
  const total = quizCountries.length;
  const current = quizCountries[currentQ];
  const region = getRegion(current);
  const isUS = region.mapType === 'us';

  document.getElementById('question-num').textContent = `問題 ${currentQ + 1} / ${total}`;
  document.getElementById('score-badge').textContent = `${score}点`;
  document.getElementById('progress-fill').style.width = `${(currentQ / total) * 100}%`;
  
  const mapWrap = document.getElementById('map-wrap');

  if (isUS) {
    document.getElementById('hint-text').textContent = '✨ 光っている州はどこ？';
    mapWrap.innerHTML = `
      <div class="map-image-wrapper">
        <img src="${US_MAP_IMAGE_BASE64}" alt="US Map" id="us-map-img">
        <div class="glow-dot" id="quiz-glow-dot" style="left: ${current.x}%; top: ${current.y}%;"></div>
      </div>
    `;
  } else {
    document.getElementById('hint-text').textContent = '🎌 この国旗の国はどこ？';
    mapWrap.innerHTML = `
      <div class="giant-flag-wrap">
        ${current.flag}
      </div>
    `;
  }

  const others = shuffle(region.countries.filter(c => c.name !== current.name)).slice(0, 2);
  const choices = shuffle([current, ...others]);
  const letters = ['A','B','C'];
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[i]}</span>${c.name}`;
    btn.onclick = () => answer(btn, c.name === current.name, current, region, choices, choicesEl);
    choicesEl.appendChild(btn);
  });
}

function answer(btn, isCorrect, current, region, choices, choicesEl) {
  if (answered) return;
  answered = true;
  const isUS = region.mapType === 'us';
  const wcKey = `${isRepairMode ? current.regionKey : selectedRegion}:${current.name}`;
  const popup = document.getElementById('result-popup');

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    popup.textContent = '⭕';
    if (wrongCounts[wcKey]) wrongCounts[wcKey] = Math.max(0, wrongCounts[wcKey] - 1);
  } else {
    btn.classList.add('wrong');
    wrongAnswers.push(current);
    wrongCounts[wcKey] = (wrongCounts[wcKey] || 0) + 1;
    Array.from(choicesEl.children).forEach(b => { if (b !== btn && b.textContent.includes(current.name)) b.classList.add('reveal'); });
    popup.textContent = '❌';
    
    if (isUS) {
      const dot = document.getElementById('quiz-glow-dot');
      if (dot) {
        dot.style.backgroundColor = 'var(--accent2)';
        dot.style.boxShadow = '0 0 15px 5px rgba(255, 95, 126, 0.6)';
      }
    }
  }
  saveWC();
  Array.from(choicesEl.children).forEach(b => b.disabled = true);

  popup.classList.add('show');
  
  setTimeout(() => {
    popup.classList.remove('show'); popup.classList.add('hide');
    setTimeout(() => {
      popup.classList.remove('hide');
      currentQ++;
      if (currentQ < quizCountries.length) showQuestion();
      else showResult();
    }, 150);
  }, 800);
}

// ─────────────────────────────────────────────
// RESULT
// ─────────────────────────────────────────────
function showResult() {
  updateRepairBanner();
  const total = quizCountries.length;
  const pct = Math.round((score / total) * 100);
  let emoji = '😢', title = 'もう一回チャレンジ！';
  if (pct === 100) { emoji = '🏆'; title = '完璧！！すごい！！'; }
  else if (pct >= 80) { emoji = '🎉'; title = 'すばらしい！'; }
  else if (pct >= 60) { emoji = '😊'; title = 'なかなかいいね！'; }
  else if (pct >= 40) { emoji = '🤔'; title = 'もう少し！'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `${score} / ${total}`;
  document.getElementById('result-detail').textContent = `正答率 ${pct}%`;

  const wl = document.getElementById('wrong-list');
  const wi = document.getElementById('wrong-items');
  if (wrongAnswers.length > 0) {
    wl.style.display = 'block';
    const newRepair = wrongAnswers.filter(c => { const k = `${isRepairMode ? c.regionKey : selectedRegion}:${c.name}`; return (wrongCounts[k]||0) >= 3; });
    document.getElementById('repair-hint').textContent = newRepair.length > 0 ? `→ ${newRepair.length}ヶ所が補修対象に！` : '';
    wi.innerHTML = wrongAnswers.map(c => {
      const k = `${isRepairMode ? c.regionKey : selectedRegion}:${c.name}`;
      return `<div class="wrong-item"><span style="font-size:20px">${c.flag||'📍'}</span><span>${c.name}</span><span class="wrong-count">累計${wrongCounts[k]||0}回</span></div>`;
    }).join('');
  } else { wl.style.display = 'none'; }

  showScreen('screen-result');
}

init();
</script>
</body>
</html>
